services:
  hotmesh:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "9229:9229"
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  hotmesh-readonly-worker:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "ts-node", "tests/durable/readonly/worker/index.ts"]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/worker-ready"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    profiles:
      - readonly

  hotmesh-readonly:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      hotmesh-readonly-worker:
        condition: service_healthy
    profiles:
      - readonly

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hotmesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

services:
  hotmesh:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "9229:9229"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
        reservations:
          cpus: '4'
          memory: 2G
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=3072 --max-semi-space-size=64
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  hotmesh-readonly-worker:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "ts-node", "tests/durable/readonly/worker/index.ts"]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/worker-ready"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    profiles:
      - readonly

  hotmesh-readonly:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      hotmesh-readonly-worker:
        condition: service_healthy
    profiles:
      - readonly

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hotmesh
    ports:
      - "5414:5432"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=200
      - -c
      - synchronous_commit=off
    shm_size: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
